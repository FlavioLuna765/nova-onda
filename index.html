<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lugar - Cafeteria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0b; }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; padding: 15px; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .mesa { border: 2px solid var(--gold); border-radius: 10px; padding: 10px; cursor: pointer; text-align: center; transition: 0.3s; height: 80px; display: flex; flex-direction: column; justify-content: center; }
        .mesa.ocupada { border-color: #ff4444; color: #ff4444; opacity: 0.6; }
        .mesa.selecionada { background: var(--gold); color: #000; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; border: none; }
        .btn-qty { background: transparent; border: 1px solid var(--gold); color: var(--gold); width: 30px; height: 30px; border-radius: 5px; }
        .item-row { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; }
        .input-contato { display: none; margin-top: 10px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="container">

    <!-- LOGIN -->
    <div id="view-setup" class="glass">
        <h2 class="text-center mb-4" style="color: var(--gold);">Lugar</h2>
        <input type="text" id="nome-cliente" class="form-control bg-dark text-white border-secondary mb-3" placeholder="Seu Nome">
        <div class="row g-2 mb-4" id="grid-mesas"></div>
        <button class="btn btn-gold w-100 p-3" onclick="validarEntrada()">ABRIR COMANDA</button>
    </div>

    <!-- CARDÁPIO -->
    <div id="view-cardapio" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 id="info-mesa" style="color: var(--gold);"></h4>
            <button class="btn btn-outline-danger btn-sm" onclick="mostrarOpcoesNota()">Fechar Conta</button>
        </div>
        <div class="glass mb-3"><div id="lista-produtos"></div></div>
        <div class="glass">
            <div id="itens-comanda" class="small mb-2"></div>
            <div class="d-flex justify-content-between fw-bold h5 mt-2 pt-2 border-top">
                <span>TOTAL c/ 10%:</span>
                <span id="total-cliente" style="color: var(--gold);">R$ 0,00</span>
            </div>
            <button id="btn-enviar" class="btn btn-gold w-100 mt-3" onclick="enviarPedido()">PEDIR AGORA</button>
        </div>
    </div>

    <!-- OPÇÕES DE NOTA -->
    <div id="view-nota" style="display:none;" class="glass text-center">
        <h4 style="color: var(--gold);">Como deseja sua nota?</h4>
        <div class="d-grid gap-2 mt-4">
            <button class="btn btn-outline-light" onclick="selecionarTipoNota('Impressa')">Nota Impressa</button>
            <button class="btn btn-outline-light" onclick="selecionarTipoNota('WhatsApp')">Via WhatsApp (PDF)</button>
            <button class="btn btn-outline-light" onclick="selecionarTipoNota('Email')">Via E-mail (PDF)</button>
        </div>

        <div id="container-contato" class="input-contato">
            <input type="text" id="valor-contato" class="form-control bg-dark text-white border-gold mb-3" placeholder="">
            <button class="btn btn-gold w-100" onclick="finalizarComContato()">ENVIAR E FINALIZAR</button>
        </div>
        
        <button class="btn btn-link text-white btn-sm mt-3" onclick="location.reload()">Cancelar</button>
    </div>

    <script>
        let clienteAtivo = { nome: "", mesa: null, itens: [], tipoNota: "" };
        const produtos = [{id:1, nome:"Heineken", preco:15}, {id:2, nome:"Amistel", preco:12}, {id:3, nome:"Porção de Camarão", preco:90}, {id:4, nome:"Peixe porquinho", preco:70}];

        function init() {
            const grid = document.getElementById('grid-mesas');
            const status = JSON.parse(localStorage.getItem('statusMesas')) || {};
            grid.innerHTML = '';
            for(let i=1; i<=10; i++){
                const ocupada = !!status[i];
                grid.innerHTML += `<div class="col-4 col-md-2">
                    <div class="mesa ${ocupada?'ocupada':''}" id="m-${i}" onclick="selecionarMesa(${i})">
                        <strong>${i}</strong><small style="font-size: 10px">${ocupada ? status[i].nome : 'Livre'}</small>
                    </div></div>`;
            }
        }

        function selecionarMesa(n) {
            const status = JSON.parse(localStorage.getItem('statusMesas')) || {};
            if(status[n]) return alert("Mesa ocupada!");
            clienteAtivo.mesa = n;
            document.querySelectorAll('.mesa').forEach(m => m.classList.remove('selecionada'));
            document.getElementById(`m-${n}`).classList.add('selecionada');
        }

        function validarEntrada() {
            clienteAtivo.nome = document.getElementById('nome-cliente').value;
            if(!clienteAtivo.nome || !clienteAtivo.mesa) return alert("Preencha tudo!");
            let status = JSON.parse(localStorage.getItem('statusMesas')) || {};
            status[clienteAtivo.mesa] = { nome: clienteAtivo.nome };
            localStorage.setItem('statusMesas', JSON.stringify(status));
            document.getElementById('view-setup').style.display = 'none';
            document.getElementById('view-cardapio').style.display = 'block';
            document.getElementById('info-mesa').innerText = `Mesa ${clienteAtivo.mesa}`;
            renderCardapio();
        }

        function renderCardapio() {
            document.getElementById('lista-produtos').innerHTML = produtos.map(p => `
                <div class="d-flex justify-content-between align-items-center item-row">
                    <div><span>${p.nome}</span><br><small>R$ ${p.preco.toFixed(2)}</small></div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn-qty" onclick="ajustarItem(${p.id}, -1)">-</button>
                        <span id="qty-${p.id}">0</span>
                        <button class="btn-qty" onclick="ajustarItem(${p.id}, 1)">+</button>
                    </div>
                </div>`).join('');
        }

        function ajustarItem(id, mod) {
            const prod = produtos.find(p => p.id === id);
            const index = clienteAtivo.itens.findIndex(i => i.id === id);
            if(mod === 1) {
                if(index > -1) clienteAtivo.itens[index].qtd++;
                else clienteAtivo.itens.push({...prod, qtd: 1});
            } else {
                if(index > -1) {
                    clienteAtivo.itens[index].qtd--;
                    if(clienteAtivo.itens[index].qtd <= 0) clienteAtivo.itens.splice(index, 1);
                }
            }
            atualizarResumo();
        }

        function atualizarResumo() {
            let subtotal = 0;
            clienteAtivo.itens.forEach(i => {
                subtotal += (i.preco * i.qtd);
                document.getElementById(`qty-${i.id}`).innerText = i.qtd;
            });
            produtos.forEach(p => { if(!clienteAtivo.itens.find(i => i.id === p.id)) document.getElementById(`qty-${p.id}`).innerText = "0"; });
            document.getElementById('total-cliente').innerText = `R$ ${(subtotal * 1.1).toFixed(2)}`;
        }

        function mostrarOpcoesNota() {
            document.getElementById('view-cardapio').style.display = 'none';
            document.getElementById('view-nota').style.display = 'block';
        }

        function selecionarTipoNota(tipo) {
            clienteAtivo.tipoNota = tipo;
            const container = document.getElementById('container-contato');
            const input = document.getElementById('valor-contato');
            
            if(tipo === 'Impressa') {
                enviarFechamento(""); 
            } else {
                container.style.display = 'block';
                input.placeholder = tipo === 'WhatsApp' ? "Digite seu número com DDD" : "Digite seu e-mail";
                input.focus();
            }
        }

        function finalizarComContato() {
            const contato = document.getElementById('valor-contato').value;
            if(!contato) return alert("Por favor, preencha o contato!");
            enviarFechamento(contato);
        }

        function enviarFechamento(contato) {
            let balcao = JSON.parse(localStorage.getItem('pedidosBalcao')) || [];
            balcao.push({ 
                mesa: clienteAtivo.mesa, 
                nome: clienteAtivo.nome, 
                status: 'pagamento', 
                nota: clienteAtivo.tipoNota,
                contato: contato 
            });
            localStorage.setItem('pedidosBalcao', JSON.stringify(balcao));
            alert("Solicitado com sucesso! Aguarde o garçom.");
            location.reload();
        }

        function enviarPedido() {
            if(clienteAtivo.itens.length === 0) return alert("Selecione algo!");
            let balcao = JSON.parse(localStorage.getItem('pedidosBalcao')) || [];
            balcao.push({ mesa: clienteAtivo.mesa, nome: clienteAtivo.nome, itens: JSON.parse(JSON.stringify(clienteAtivo.itens)), status: 'producao' });
            localStorage.setItem('pedidosBalcao', JSON.stringify(balcao));
            alert("Pedido enviado!");
        }
        init();
    </script>
</body>
</html>
