<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balcão Real-Time - Sistema Bar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #ffb300; --dark: #0f0f12; --card-bg: #16161a; --rock-red: #d32f2f; }
        body { background: var(--dark); color: #f0f0f0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card-mesa { background: var(--card-bg); border: 1px solid #2d2d35; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); margin-bottom: 20px; }
        .status-pagamento { border: 2px solid var(--rock-red); box-shadow: 0 0 20px rgba(211, 47, 47, 0.4); }
        .alerta-pgto { background: rgba(211, 47, 47, 0.15); border: 1px solid var(--rock-red); padding: 10px; border-radius: 6px; margin-bottom: 15px; color: #ff8a80; }
        .item-linha { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #2d2d35; font-size: 0.95rem; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; border: none; width: 100%; padding: 10px; border-radius: 6px; }
        .btn-gold:hover { background: #ffa000; }
    </style>
</head>
<body>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 style="color: var(--gold); font-weight: bold;">🎸 MONITOR DO BALCÃO</h2>
            <button class="btn btn-outline-secondary btn-sm" onclick="fetchPedidos()">🔄 Atualizar Agora</button>
        </div>

        <div id="lista-pedidos" class="row">
            <p class="text-muted text-center">Buscando pedidos pendentes no banco de dados...</p>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        async function fetchPedidos() {
            try {
                const res = await fetch('/api/orders/active', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if(res.status === 401 || res.status === 403) {
                    window.location.href = 'login.html';
                    return;
                }

                const pedidos = await res.json();
                const container = document.getElementById('lista-pedidos');
                container.innerHTML = '';

                if(pedidos.length === 0) {
                    container.innerHTML = `<div class="text-center my-5 text-muted"><h5>Nenhum pedido pendente no momento. Fila limpa! 🙌</h5></div>`;
                    return;
                }

                pedidos.forEach(p => {
                    const isPgto = p.status === 'pagamento';
                    
                    container.innerHTML += `
                        <div class="col-md-4" id="order-card-${p.id}">
                            <div class="card card-mesa ${isPgto ? 'status-pagamento' : ''}">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h5 class="m-0 fw-bold text-white">Mesa ${p.mesa}</h5>
                                        <span class="badge ${isPgto ? 'bg-danger' : 'bg-success'}">${p.status.toUpperCase()}</span>
                                    </div>
                                    <h6 class="text-muted mb-3">Cliente: <span class="text-white">${p.cliente}</span></h6>

                                    ${isPgto ? `
                                        <div class="alerta-pgto small">
                                            <b>⚠️ PEDIDO DE FECHAMENTO</b><br>
                                            Formato da Nota: <b>${p.nota}</b><br>
                                            ${p.contato ? `Enviar para: <b>${p.contato}</b>` : ''}
                                        </div>
                                    ` : ''}

                                    <div class="mb-4">
                                        ${p.itens.map(i => `
                                            <div class="item-linha">
                                                <span><b style="color: var(--gold);">${i.qtd}x</b> ${i.name}</span>
                                                <span class="text-muted">R$ ${(i.price * i.qtd).toFixed(2)}</span>
                                            </div>
                                        `).join('')}
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <span class="small text-muted">Total (c/ 10%)</span>
                                        <h4 class="m-0 fw-bold" style="color: var(--gold);">R$ ${p.total.toFixed(2)}</h4>
                                    </div>

                                    <button class="btn btn-gold" onclick="finalizarPedido(${p.id})">RECEBER E LIBERAR</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                console.error("Erro ao carregar balcão:", err);
            }
        }

        async function finalizarPedido(id) {
            if(!confirm("Deseja dar baixa e arquivar esse pedido?")) return;

            const res = await fetch(`/api/orders/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: 'finalizado' })
            });

            if(res.ok) {
                fetchPedidos(); // Recarrega a fila atualizada
            } else {
                alert("Erro ao finalizar pedido.");
            }
        }

        // Auto-refresh a cada 5 segundos para monitoramento em tempo real
        setInterval(fetchPedidos, 5000);
        fetchPedidos();
    </script>
</body>
</html>
