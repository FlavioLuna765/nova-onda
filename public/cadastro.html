<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Praia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1a202c; font-family: sans-serif; display: flex; align-items: center; min-height: 100vh; }
        .card-login { background-color: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-gold { background-color: #f59e0b; color: #ffffff; font-weight: bold; border: none; }
        .btn-gold:hover { background-color: #d97706; color: #ffffff; }
        .link-login { color: #d97706; font-weight: bold; text-decoration: none; }
        .link-login:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card-login">
                    <h3 class="text-center mb-4 text-dark fw-bold">📝 Cadastrar Operador / ADM</h3>
                    <form id="form-cadastro">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Nome Completo</label>
                            <input type="text" id="cad-name" class="form-control bg-white text-dark border-secondary" placeholder="Nome do funcionário" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">E-mail de Acesso</label>
                            <input type="email" id="cad-email" class="form-control bg-white text-dark border-secondary" placeholder="Ex: operador@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Senha</label>
                            <input type="password" id="cad-password" class="form-control bg-white text-dark border-secondary" placeholder="Defina uma senha estável" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Nível de Acesso</label>
                            <select id="cad-role" class="form-select bg-white text-dark border-secondary">
                                <option value="admin">Administrador (Acessa Tudo)</option>
                                <option value="user">Atendente / Balcão</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-gold w-100 mt-2 py-2 text-uppercase">Registrar Usuário</button>
                    </form>
                    <div class="text-center mt-4">
                        <span class="text-muted small">Já possui uma conta?</span>
                        <a href="login.html" class="link-login small ms-1">Voltar para o Login 🔐</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('cad-name').value;
            const email = document.getElementById('cad-email').value;
            const password = document.getElementById('cad-password').value;
            const role = document.getElementById('cad-role').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                const data = await res.json();
                if(res.ok) {
                    alert("Usuário registrado com sucesso!");
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || "Erro no cadastro.");
                }
            } catch(err) { alert("Erro de rede."); }
        });
    </script>
</body>
</html>
