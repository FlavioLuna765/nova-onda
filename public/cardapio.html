<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - Atendimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --ocean-blue: #006699; --sky-blue: #e6f2ff; --sun-gold: #f2a900; --dark-text: #2c3e50; }
        body { background: linear-gradient(135deg, var(--sky-blue) 0%, #ffffff 100%); color: var(--dark-text); font-family: 'Nunito', sans-serif; min-height: 100vh; padding: 15px; }
        h5, h6 { font-family: 'Comfortaa', cursive; font-weight: 700; color: var(--ocean-blue); }
        .card-praia { background: rgba(255, 255, 255, 0.95); border: none; border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(0, 102, 153, 0.1); margin-bottom: 15px; }
        .btn-praia { background: var(--sun-gold); color: #ffffff; font-weight: 800; border: none; border-radius: 12px; padding: 12px; text-transform: uppercase; width: 100%; }
        .btn-qty { background: var(--sky-blue); border: 1px solid var(--ocean-blue); color: var(--ocean-blue); width: 32px; height: 32px; border-radius: 50%; font-weight: bold; }
        .item-row { border-bottom: 1px solid #e2e8f0; padding: 12px 0; }
        .input-contato { display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="view-cardapio">
        <div class="card-praia d-flex justify-content-between align-items-center py-3">
            <h5 id="info-mesa" class="m-0">Carregando...</h5>
            <button class="btn btn-sm btn-danger fw-bold" onclick="mostrarOpcoesNota()">Pedir Conta 💳</button>
        </div>

        <!-- AJUSTE 2: CONTA ATUAL ACUMULADA NA PRAIA -->
        <div class="card-praia bg-white">
            <h6>📋 Seu Consumo Atual na Mesa</h6>
            <div id="extrato-mesa" class="small text-muted mb-2">Nenhum item lançado ainda.</div>
            <div id="valores-extrato" class="border-top pt-2 small" style="display:none;">
                <div class="d-flex justify-content-between"><span>Subtotal Itens:</span><span id="extrato-subtotal">R$ 0,00</span></div>
                <div class="d-flex justify-content-between text-success"><span>Taxa do Quiosque (10%):</span><span id="extrato-taxa">R$ 0,00</span></div>
                <div class="d-flex justify-content-between fw-bold text-dark mt-1"><span>Total Acumulado:</span><span id="extrato-total">R$ 0,00</span></div>
            </div>
        </div>
        
        <div class="card-praia">
            <h5 class="mb-3">🍹 Adicionar Novos Itens</h5>
            <div id="lista-produtos"><p class="text-center text-muted">Carregando quiosque...</p></div>
        </div>
        
        <div class="card-praia sticky-bottom">
            <div class="d-flex justify-content-between fw-bold h6">
                <span>Novos Itens Selecionados (com 10%):</span>
                <span id="total-cliente" style="color: var(--ocean-blue);">R$ 0,00</span>
            </div>
            <button class="btn btn-praia w-100 mt-3" onclick="enviarPedido()">Enviar Novos Itens pro Balcão 🚀</button>
            <button class="btn btn-link text-muted w-100 mt-1 btn-sm" onclick="location.href='comanda.html'">↩️ Sair do Cardápio</button>
        </div>
    </div>

    <!-- TELA DE ENCERRAMENTO -->
    <div id="view-nota" style="display:none;" class="card-praia text-center">
        <h3>Encerrar Consumo</h3>
        <p class="text-muted">Como deseja receber o extrato da conta?</p>
        
        <div class="d-grid gap-2 my-4">
            <button class="btn btn-lg btn-outline-primary" onclick="selecionarTipoNota('Impressa')">📄 Extrato Impresso</button>
            <button class="btn btn-lg btn-outline-success" onclick="selecionarTipoNota('WhatsApp')">💬 Chamar no WhatsApp</button>
            <button class="btn btn-lg btn-outline-info text-white" style="background-color: #00bcff" onclick="selecionarTipoNota('Email')">📧 Enviar por E-mail</button>
            <!-- AJUSTE 3: OPÇÃO NÃO DESEJO NOTA -->
            <button class="btn btn-lg btn-outline-secondary" onclick="selecionarTipoNota('Não Desejo Nota')">❌ Não Desejo Nota</button>
        </div>

        <div id="container-contato" class="input-contato">
            <input type="text" id="valor-contato" class="form-control form-control-lg text-center mb-3">
            <button class="btn btn-praia" onclick="finalizarComContato()">Confirmar Pedido de Conta</button>
        </div>
        <button class="btn btn-link text-muted mt-3" onclick="cancelarFechamento()">Voltar ao Cardápio</button>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const urlParams = new URLSearchParams(window.location.search);
        const mesaAtiva = parseInt(urlParams.get('mesa'));
        const clienteAtivoNome = urlParams.get('cliente');

        let sacola = { mesa: mesaAtiva, cliente: clienteAtivoNome, itens: [], tipoNota: "" };
        let produtos = [];

        async function initCardapio() {
            document.getElementById('info-mesa').innerText = `Mesa ${mesaAtiva} • ${clienteAtivoNome}`;
            
            // Carrega consumo real do banco de dados
            try {
                const resExtrato = await fetch(`/api/orders/mesa/${mesaAtiva}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dadosMesa = await resExtrato.json();
                
                if(dadosMesa && dadosMesa.itens.length > 0) {
                    document.getElementById('extrato-mesa').innerHTML = dadosMesa.itens.map(i => `
                        <div class="d-flex justify-content-between">
                            <span>${i.qtd}x ${i.name}</span>
                            <span>R$ ${(i.price * i.qtd).toFixed(2)}</span>
                        </div>
                    `).join('');
                    
                    const subtotalReal = dadosMesa.itens.reduce((acc, i) => acc + (i.price * i.qtd), 0);
                    const taxaReal = subtotalReal * 0.10;
                    const totalReal = subtotalReal + taxaReal;

                    document.getElementById('extrato-subtotal').innerText = `R$ ${subtotalReal.toFixed(2)}`;
                    document.getElementById('extrato-taxa').innerText = `R$ ${taxaReal.toFixed(2)}`;
                    document.getElementById('extrato-total').innerText = `R$ ${totalReal.toFixed(2)}`;
                    document.getElementById('valores-extrato').style.display = 'block';
                } else {
                    document.getElementById('extrato-mesa').innerText = "Nenhum consumo registrado ainda nesta mesa.";
                    document.getElementById('valores-extrato').style.display = 'none';
                }
            } catch(e) { console.warn("Erro extrato:", e); }

            // Carrega catálogo
            try {
                const res = await fetch('/api/products', { headers: { 'Authorization': `Bearer ${token}` } });
                produtos = await res.json();
                document.getElementById('lista-produtos').innerHTML = produtos.map(p => `
                    <div class="d-flex justify-content-between align-items-center item-row">
                        <div><span class="fw-bold d-block">${p.name}</span><span class="badge bg-success">R$ ${p.price.toFixed(2)}</span></div>
                        <div class="d-flex align-items-center gap-2">
                            <button class="btn-qty" onclick="ajustarItem(${p.id}, -1)">-</button>
                            <span id="qty-${p.id}" class="fw-bold">0</span>
                            <button class="btn-qty" onclick="ajustarItem(${p.id}, 1)">+</button>
                        </div>
                    </div>`).join('');
            } catch (error) { }
        }

        function ajustarItem(id, mod) {
            const prod = produtos.find(p => p.id === id);
            const index = sacola.itens.findIndex(i => i.id === id);
            if(mod === 1) {
                if(index > -1) sacola.itens[index].qtd++;
                else sacola.itens.push({...prod, qtd: 1});
            } else {
                if(index > -1) {
                    sacola.itens[index].qtd--;
                    if(sacola.itens[index].qtd <= 0) sacola.itens.splice(index, 1);
                }
            }
            let sub = 0;
            sacola.itens.forEach(i => { sub += (i.price * i.qtd); document.getElementById(`qty-${i.id}`).innerText = i.qtd; });
            produtos.forEach(p => { if(!sacola.itens.find(i => i.id === p.id)) { const el = document.getElementById(`qty-${p.id}`); if(el) el.innerText = "0"; } });
            document.getElementById('total-cliente').innerText = `R$ ${(sub * 1.1).toFixed(2)}`;
        }

        async function enviarPedido() {
            if (sacola.itens.length === 0) return alert("Selecione itens primeiro!");
            const totalEnvio = sacola.itens.reduce((acc, i) => acc + (i.price * i.qtd), 0) * 1.10;

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ mesa: sacola.mesa, cliente: sacola.cliente, itens: sacola.itens, total: totalEnvio, status: 'producao' })
                });
                if (res.ok) {
                    alert("Pedido enviado com sucesso!");
                    sacola.itens = [];
                    initCardapio();
                }
            } catch (error) { }
        }

        function mostrarOpcoesNota() { document.getElementById('view-cardapio').style.display = 'none'; document.getElementById('view-nota').style.display = 'block'; }
        function cancelarFechamento() { document.getElementById('view-nota').style.display = 'none'; document.getElementById('view-cardapio').style.display = 'block'; }

        function selecionarTipoNota(tipo) {
            sacola.tipoNota = tipo;
            const container = document.getElementById('container-contato');
            // AJUSTE 3: Se for impressa ou se não desejar nota, fecha direto!
            if(tipo === 'Impressa' || tipo === 'Não Desejo Nota') {
                enviarFechamento("Dispensado"); 
            } else {
                container.style.display = 'block';
                document.getElementById('valor-contato').placeholder = tipo === 'WhatsApp' ? "WhatsApp com DDD" : "E-mail do Cliente";
                document.getElementById('valor-contato').focus();
            }
        }

        function finalizarComContato() {
            const contato = document.getElementById('valor-contato').value;
            if(!contato) return alert("Preencha o dado de contato!");
            enviarFechamento(contato);
        }

        async function enviarFechamento(contato) {
            try {
                const res = await fetch(`/api/orders/status-mesa/${sacola.mesa}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ status: 'pagamento', nota: sacola.tipoNota, contato: contato })
                });
                if (res.ok) { alert("Conta solicitada!"); window.location.href = 'comanda.html'; }
            } catch (e) { }
        }

        initCardapio();
    </script>
</body>
</html>
